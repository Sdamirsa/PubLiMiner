general:
  output_dir: output/cardiac_mri
  project_name: "Cardiac MRI — European author specialty (2023–2026 pilot)"
  log_level: INFO
  on_error: skip
  max_error_rate: 0.05
  seed: 42

cache:
  ttl_days: 365  # long TTL — corpus is historical, queries won't change

steps:
  - fetch
  - parse
  - deduplicate
  - filter     # geographic post-filter: keep only papers with ≥1 European affiliation
  - extract    # LLM author specialty classification
  # TODO (not yet implemented):
  # - classify  # rule-based specialty classification (alternative to LLM extract)

fetch:
  # Topic: cardiac / cardiovascular MRI and CMR
  # PILOT RUN: limited to 2023–2026 to validate pipeline before running the full 2000–2026 corpus
  # To run the full date range: change start_date to "2000/01/01"
  query: |
    (
      "cardiac MR*"[Title/Abstract] OR
      "cardiovascular MR*"[Title/Abstract] OR
      "cardiac magnetic resonance"[Title/Abstract] OR
      "cardiovascular magnetic resonance"[Title/Abstract] OR
      "CMR"[Title/Abstract] OR
      "cardiac MR"[Title/Abstract] OR
      "heart MRI"[Title/Abstract] OR
      "cardiac magnetic resonance imaging"[Title/Abstract] OR
      "cardiovascular magnetic resonance imaging"[Title/Abstract]
    )
  start_date: "2001/01/01"   # PILOT: last 3 years — change to 2000/01/01 for full run
  end_date: "2026/04/30"
  email: ""          # set PUBMED_EMAIL in .env
  api_key: ""        # set NCBI_API_KEY in .env (raises rate limit 3→10 req/s)
  max_results: 0     # 0 = no limit
  batch_size: 500
  retry_attempts: 3
  rate_limit_per_second: 3.0
  download_mode: full
  ret_mode: xml
  ret_type: ""

parse:
  min_abstract_length: 0
  language_filter: ""       # no language restriction
  remove_html: true
  prepare_llm_input: true
  flag_exclusions: false

deduplicate:
  check_doi: true
  check_title_fuzzy: true
  fuzzy_threshold: 90
  remove_retracted: true

filter:
  # Keep papers with ≥1 author whose affiliation contains a European country/region name.
  # Matching is case-insensitive substring search across all author affiliation strings.
  output_column: "is_european"
  min_author_matches: 1
  drop_non_matching: false   # tag only — let extract.filter_column do the actual filtering
  case_sensitive: false
  keywords:
    # Country names (English)
    - "albania"
    - "andorra"
    - "austria"
    - "belarus"
    - "belgium"
    - "bosnia"
    - "bulgaria"
    - "croatia"
    - "cyprus"
    - "czech republic"
    - "czechia"
    - "denmark"
    - "estonia"
    - "finland"
    - "france"
    - "georgia"
    - "germany"
    - "greece"
    - "hungary"
    - "iceland"
    - "ireland"
    - "italy"
    - "kosovo"
    - "latvia"
    - "liechtenstein"
    - "lithuania"
    - "luxembourg"
    - "malta"
    - "moldova"
    - "monaco"
    - "montenegro"
    - "netherlands"
    - "north macedonia"
    - "norway"
    - "poland"
    - "portugal"
    - "romania"
    - "russia"
    - "san marino"
    - "serbia"
    - "slovakia"
    - "slovenia"
    - "spain"
    - "sweden"
    - "switzerland"
    - "turkey"
    - "ukraine"
    - "united kingdom"
