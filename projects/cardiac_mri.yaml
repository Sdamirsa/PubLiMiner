extract:
  # v2 schema: relevance enum changed from "Irrelevant" → "NotRelevant" on 2026-05-06.
  # Old extractions (run_id < 20260506) used "Irrelevant"; visualize_run.py normalizes both.
  # Bump to cardiac_mri_v3 only if field definitions change structurally (new fields, type change).
  schema_name: "cardiac_mri_v2"
  run_id: ""  # auto-generated if empty
  model: "openai/gpt-oss-120b"
  fallback_models:
    - "anthropic/claude-haiku-4-5"
    - "openai/gpt-4o-mini"
  max_tokens: 4096
  temperature: 0.2
  seed: 42
  provider:
    order: []
    allow_fallbacks: true
    require_parameters: true
    data_collection: "deny"
    sort: "price"
  include_title: true
  include_abstract: true
  include_author_block: true
  extra_columns:
    - "pub_type"
  user_instruction: >
    You are classifying European cardiac MRI publications for a specialty-gap analysis.
    Classify study relevance, study design, and author specialties.
    For author specialty, use ONLY the FIRST listed affiliation for each author.
    Use only what is explicitly stated — never infer from context.
    CRITICAL: Return ONLY the exact string values listed for each field. Do not paraphrase, explain, or add any text.
  fields:
    - name: relevance
      type: enum
      values: ["Main", "Secondary", "NotRelevant"]
      description: >
        How central is cardiac MRI/CMR to this paper?
        Return EXACTLY one of: "Main", "Secondary", or "NotRelevant" — no other text.
        Main: cardiac MRI is the primary modality, method, or focus (CMR protocol study,
        cardiac MRI diagnosis, CMR as primary endpoint).
        Secondary: cardiac MRI is one of several methods used, mentioned in passing, or a secondary tool
        alongside other dominant imaging modalities.
        NotRelevant: paper appeared due to keyword match but cardiac MRI is not meaningfully part of the work.
      required: true
    - name: study_type
      type: enum
      values: ["OriginalResearch", "CaseReportOrSeries", "Review", "SystematicReviewOrMetaAnalysis", "Other"]
      description: >
        Study design. Use the pub_type field as a hint where provided.
        Return EXACTLY one of: "OriginalResearch", "CaseReportOrSeries", "Review", "SystematicReviewOrMetaAnalysis", or "Other" — no other text.
        OriginalResearch: primary data collection — cohort, RCT, cross-sectional, registry, prospective or retrospective study.
        CaseReportOrSeries: one or a small series of individual patient cases.
        Review: narrative literature review without systematic methodology.
        SystematicReviewOrMetaAnalysis: systematic literature search with PRISMA-style methods; with or without meta-analysis.
        Other: editorial, commentary, letter, erratum, conference abstract, technical note, or unclear design.
      required: true
    - name: first_author_specialty
      type: enum
      values: ["Radiology", "Cardiology", "Unclear"]
      description: >
        Specialty of the first author inferred from their FIRST listed affiliation ONLY.
        Return EXACTLY one of: "Radiology", "Cardiology", or "Unclear" — no other text.
        Radiology: department of radiology, radiodiagnostics, diagnostic imaging, radiological sciences,
        medical imaging, radiology and nuclear medicine.
        Cardiology: cardiology department, cardiovascular medicine, cardiac center, heart center,
        cardiovascular center, department of cardiology.
        Unclear: nuclear medicine only, mixed departments, no affiliation listed, or affiliation does not
        clearly indicate radiology or cardiology.
      required: true
    - name: last_author_specialty
      type: enum
      values: ["Radiology", "Cardiology", "Unclear"]
      description: >
        Specialty of the last author inferred from their FIRST listed affiliation ONLY.
        Return EXACTLY one of: "Radiology", "Cardiology", or "Unclear" — no other text.
        Apply the same classification rules as for first_author_specialty.
        If there is only one author, use the same value as first_author_specialty.
      required: true
    - name: corresponding_author_specialty
      type: enum
      values: ["Radiology", "Cardiology", "Unclear", "NotReported"]
      description: >
        Specialty of the corresponding author (marked with * in affiliations or "Corresponding (*):" label).
        Return EXACTLY one of: "Radiology", "Cardiology", "Unclear", or "NotReported" — no other text.
        Use ONLY their FIRST listed affiliation. Apply the same Radiology/Cardiology/Unclear rules.
        NotReported: no corresponding author is identified in the author block.
        If the corresponding author is the same person as the first or last author, still classify their specialty.
      required: true
  repair:
    pattern_fix: true
    llm_fix: true
    fix_model: ""
  filter_column: ""   # extract all papers (is_european tag still present for downstream filtering)
  max_cost_usd: 50.0
  concurrency: 20
